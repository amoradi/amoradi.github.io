---
layout: default
---

  {% for post in site.posts %}
 
  <div class="tile col-xs-12 col-sm-4 col-md-3 col-lg-3" style="background:#abffec;color:#333;">
    <h2>{{ post.title }}</h2>
    <time datetime="{{ post.date }}">
      <script>
        var d = new Date("{{ post.date }}"),
        dStr = MonthNames[d.getMonth()];
        dStr += " " + d.getUTCDate() + ", " + d.getFullYear();
        document.write(dStr);
      </script></time>
    {{ post.excerpt }}
    <a href="{{ site.baseurl }}{{ post.url }}">READ MORE →</a>
  </div>
  
  {% endfor %}
