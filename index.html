---
layout: grid
---
 
  {% for post in site.posts %}
 
  <a href="{{ site.baseurl }}{{ post.url }}" class="tile col-xs-12 col-sm-4 col-md-3 col-lg-3 col-xl-2_4 col-xxl-1_5">
    <h2>{{ post.title }}</h2>
    <time datetime="{{ post.date }}">
      {{ post.date | date: '%B %d, %Y' }}
    </time>
    {{ post.excerpt }}
    <span class="read-more">READ MORE →</span>
  </a>
  
  {% endfor %}

  <aside class="index">
    <span class="index-anchor"><span>index</span></span>
  </aside>
