---
layout: default
---

  {% for post in site.posts %}
  
  <script>
    var monthNames = [
      "January",
      "February",
      "March",
      "April",
      "May",
      "June",
      "July",
      "August",
      "September",
      "October",
      "November",
      "December"
    ],
    d = new Date("{{ post.date }}"),
    dStr = monthNames[d.getMonth()],
    dStr += d.getUTCDate() + ", ",
    dStr += d.getFullYear();
  </script>
  
  <div class="col-xs-12 col-sm-4 col-md-3 col-lg-2" style="background:#abffec;color:#333;">
    <h2>{{ post.title }}</h2>
    <time datetime="{{ post.date }}">
      <script>
        document.write(dStr);
      </script>
    </time>
    {{ post.excerpt }}
    <a href="{{ site.baseurl }}{{ post.url }}">READ MORE →</a>
  </div>
  
  {% endfor %}
