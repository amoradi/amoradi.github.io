---
layout: shelf
---
 
  {% for book in site.shelf %}
 
    <div class="tile col-xs-12 col-sm-3 col-md-2 col-lg-2 col-xxl-1_5">
      <div class="book-rect">

      	<div class="book-top"></div>
      	<div class="book-side">
      		<h2>{{ book.title }}</h2>
      		<span class="shelf-author">by {{ book.author }}</span>
      	</div>
      </div>     
    </div>
  
  {% endfor %}
