<script>
(function() {
  'use strict';
  
  var proto = Object.create(HTMLElement.prototype);
  proto.name = 'Custom Element';
    
  proto.alert = function() {
    alert('This is ' + this.name);
  };
  
  proto.createChildren = function(attribute, elem) {
    var attrValue = this.getAttribute(attribute);
    
    if (attrValue) {
      if (elem === 'img') {
        return document.createElement(elem).src = attrValue;
      } else {
        return document.createElement(elem).textContent = attrValue;
      }
    }
  };
  
  proto.createdCallback = function() {
    var div = document.createElement('div');
    div.textContent = 'This is Custom Element';
    
    this.appendChild(div);
    this.appendChild(this.createChildren('data-img', 'img'));
  };
  
  document.registerElement('book-preview', {
    extends: 'figure',
    prototype: proto
  });
    
})();
