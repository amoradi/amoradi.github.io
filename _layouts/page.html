---
layout: default
type: page-layout
---

<article class="page">
  <h1 class="page-post-title">{{ page.title }}</h1>
  {% if page.subtitle != null %}
  	<h4>{{ page.subtitle }}</h4>
  {% endif %}
  {% if page.author != null %}
  	<h5>by {{ page.author }}</h5>
  {% endif %}
  
  <div class="entry">
    {{ content }}
  </div>
</article>
