---
layout: default
type: page-layout
---

<article class="page">
  <h1 class="page-post-title">{{ page.title }}</h1>
  {% if page.subtitle != null %}
  	<h4>{{ page.subtitle }}
      {% if page.author != null %}
        | by {{ page.author }}
      {% endif %}
  	</h4>
  {% endif %}
  {% if page.author != null && page.subtitle == null %}
    <h4>by {{ page.author }}</h4>
  {% endif %}
  
  <div class="entry">
    {{ content }}
  </div>
</article>
