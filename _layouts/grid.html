---
layout: default
---

<article class="grid">
{{ content }}
</article>
<aside class="index">
	<span class="index-anchor"><span class="open-index">post index</span><div class="x x-top"></div><div class="x x-btm"></div></span>
	<section class="index-content">
		{% for post in site.posts %}
 
		  <a href="{{ site.baseurl }} {{ post.url }}" class="post-view-post">
		  	<span>{{ post.title }}</span><span>{{ post.date | date: '%m.%d.%Y' }}</span></a>
		 {% endfor %}
	</section>
</aside>
