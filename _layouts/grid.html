---
layout: default
---

<article class="grid scene_element scene_element--fadein">
{{ content }}
</article>
<aside class="index scene_element scene_element--fadeinup">
	<span class="index-anchor"><span>post index</span></span>
	<section class="index-content">
		{% for post in site.posts %}
 
		  <a href="{{ site.baseurl }} {{ post.url }}" class="post-view-post">
		  	 <span>{{ post.date | date: '%B %d, %Y' }}</span> <span>{{ post.title }}</span></a>
		 {% endfor %}
	</section>
</aside>
