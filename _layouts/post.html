---
layout: default
---

<article class="post scene_element scene_element--fadein">
  <a class="back" href="javascript:history.back()">&larr; back</a>
  <h1 class="hidden-xs page-post-title">{{ page.title }}</h1>
  {% if page.subtitle != null %}
  	<h4>{{ page.subtitle }}</h4>
  {% endif %}
  <time class="post-date">Written on {{ page.date | date: "%B %e, %Y" }}</time>

  <div class="entry">
    {{ content }}
  </div>

  {% include disqus.html %}
</article>
