---
layout: default
---

<article class="shelf">
{{ content }}
</article>
<aside class="index">
	<span class="index-anchor"><span class="open-index">post index</span><div class="x x-top"></div><div class="x x-btm"></div></span>
	<section class="index-content">
		{% for book in site.shelf %}

		  <figure is="book-preview"
		    data-img="{{ book.cover }}"
		    data-title="{{ book.title }}"
		    data-subtitle="{{ book.subtitle }}"
		    data-author="{{ book.author }}"
		    data-pages="{{ book.pages }}"
		    data-publisher="{{ book.publisher }}"
		    data-isbn-13="{{ book.isbn-13 }}"
		    data-review="{{ book.review }}"
		    data-review-author="{{ book.review-author }}">
		  </figure>
  
		{% endfor %}

		<keyboard-arrows>
		    <img class="prev-arrow" src="/images/index-arrow-left.png" /><img class="next-arrow" src="/images/index-arrow-right.png" />
		</keyboard-arrows>
	</section>
</aside>
