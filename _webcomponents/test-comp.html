    h1 { font-family: "Raleway", sans-serif;

    }
    blockquote {
	color: #222;

	background-color: #fff;

    }
    blockquote .author {
	font-size: 1.6rem;

	width: 80%;
	margin: 0 auto;
	display: block;

  </style>
  
  <h1>you are an idiot</h1>
</template>

<script>
	 
	

	var proto = Object.create(HTMLElement.prototype, {
	  createdCallback: {
	    value: function() {
	    
	    var documentCurrentScript = document._currentScript || document.currentScript;
			var template = documentCurrentScript.ownerDocument.querySelector('#test-comp');

			// shadow root
			var shadow = this.createShadowRoot();
			
			// clone template and append to elem's shadow DOM
			var clone = documentCurrentScript.ownerDocument.importNode(template.content, true);
			shadow.appendChild(clone);
	    }
	  }
	});
	document.registerElement('test-comp', {prototype: proto});
</script>
